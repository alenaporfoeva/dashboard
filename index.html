<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="img/icon-v2.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page">
        <div class="side-panel">
            <button id="toggle-button">☰</button>
            <div class="period-container">
                <h3>Period</h3>
                <select id="month-select" class="month-select">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
                <select id="year-select" class="year-select">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <nav>
                <a href="#" id="nav-projects" class="nav-item active">Projects</a>
                <a href="#" id="nav-employees" class="nav-item">Employees</a>
            </nav>
        </div>
        <div class="main-content">
            <button id="open-button" class="hidden">→</button>
            <div class="content-wrapper">
                <div id="projects-content">
                    <div class="content-header">
                        <h1>Projects</h1>
                        <div class="header-buttons">
                            <button id="add-project-btn" class="add-btn">+ Add Project</button>
                            <button id="seed-data-btn" class="add-btn">Seed data</button>
                        </div>
                    </div>
                    <table id="projects-table">
                        <thead>
                            <tr>
                                <th class="sortable filterable" data-sort="companyName" data-filter="companyName">
                                    Company Name <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable filterable" data-sort="projectName" data-filter="projectName">
                                    Project Name <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable" data-sort="budget">
                                    Budget <span class="sort-icon">⇅</span>
                                </th>
                                <th class="sortable" data-sort="employeeCapacity">
                                    Employee Capacity <span class="sort-icon">⇅</span>
                                </th>
                                <th>Employees</th>
                                <th class="sortable sorted" data-sort="estimatedIncome">
                                    Estimated Income <span class="sort-icon">↑</span>
                                </th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div id="projects-total-income" class="total-income-info">
                    <strong>Total Estimated Income:</strong>
                    <span class="total-amount positive-income">$0.00</span>
                </div>
            </div>
            <div class="content-wrapper">
                <div id="employees-content">
                    <div class="content-header">
                        <h1>Employees</h1>
                        <div class="header-buttons">
                            <button id="add-employee-btn" class="add-btn">+ Add Employee</button>
                        </div>
                    </div>
                    <table id="employees-table">
                        <thead>
                            <tr>
                                <th class="sortable filterable" data-sort="name" data-filter="name">
                                    Name <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable filterable" data-sort="surname" data-filter="surname">
                                    Surname <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable" data-sort="age">
                                    Age <span class="sort-icon">⇅</span>
                                </th>
                                <th class="sortable filterable" data-sort="position" data-filter="position">
                                    Position <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable" data-sort="salary">
                                    Salary <span class="sort-icon">⇅</span>
                                </th>
                                <th class="sortable" data-sort="estimatedPayment">
                                    Estimated Payment <span class="sort-icon">⇅</span>
                                </th>
                                <th class="sortable filterable" data-sort="projectId" data-filter="projectId">
                                    Project <span class="sort-icon">⇅</span><span class="filter-icon"
                                        title="Filter">⌕</span>
                                </th>
                                <th class="sortable" data-sort="projectedIncome">
                                    Projected Income <span class="sort-icon">⇅</span>
                                </th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
